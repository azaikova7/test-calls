<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Тест ссылок tel, sip, callto</title>
</head>
<body>
    <h2> tel: (телефонные номера)</h2>
	<a href="tel:+71234567890">+71234567890</a>
		
	<h2>sip: (SIP-адреса)</h2>
	<a href="sip:1001@pbx.example.com">1001@pbx.example.com</a>
        
	<h2>callto:</h2>
	<a href="callto:+71234567890">+71234567890</a>


</body>
</html>
